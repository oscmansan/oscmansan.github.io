{% include base_path %}

<!-- start custom head snippets -->

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#282b35"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Web fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Mono&display=swap" rel="stylesheet">

<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Custom styles -->
<style>
/* Typography override */
body {
  font-size: 16px;
  font-weight: 300;
  letter-spacing: -0.011em;
}
h1, h2, h3 {
  font-weight: 700;
  letter-spacing: -0.02em;
}
h4, h5, h6 {
  font-weight: 500;
  letter-spacing: -0.01em;
}
code, pre {
  font-weight: 400;
}

/* Author sidebar polish */
.author__name,
.sidebar .author__name {
  font-weight: 700;
  font-size: 1.6em;
}
.author__name a {
  text-decoration: none;
  color: inherit;
}
.author__bio,
.sidebar .author__bio {
  font-size: 1.05em;
  font-weight: 400;
  opacity: 0.85;
  margin-top: 0.3em;
  margin-bottom: 0;
}
.author__urls-wrapper a,
.author__urls li {
  font-size: 0.95em;
  font-weight: 400;
}
/* Research keyword tags */
.author__keywords {
  margin-top: 0.8em;
  margin-bottom: 1.2em;
  display: flex;
  flex-wrap: wrap;
  gap: 0.35em;
}
.author__keyword {
  font-size: 0.72em;
  font-weight: 500;
  padding: 0.2em 0.6em;
  border-radius: 3px;
  border: 1px solid rgba(118, 202, 241, 0.35);
  color: #76caf1;
  white-space: nowrap;
}

/* News section — bullet list */
.news-list ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0.5em;
}
.news-list li {
  padding: 0.35em 0;
  line-height: 1.6;
  font-weight: 300;
  border-bottom: 1px solid var(--global-border-color, #243040);
}
.news-list li:last-child {
  border-bottom: none;
}
.news-list .news-date {
  font-weight: 500;
  font-size: 0.85em;
  color: #fae377;
  margin-right: 0.8em;
}

/* Section headings */
.page__content h2,
.archive h2 {
  font-size: 1.3em;
  margin-top: 2em;
  padding-bottom: 0.3em;
  border-bottom: 1px solid rgba(118, 202, 241, 0.25);
}

/* Barron-style publication entries */
.pub-entry {
  display: flex;
  gap: 1.2em;
  padding: 0.8em 0;
  border-bottom: 1px solid var(--global-border-color, #243040);
}
.pub-entry:last-child {
  border-bottom: none;
}
.pub-image {
  flex: 0 0 160px;
  max-width: 160px;
}
.pub-image img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 4px;
  background: #ffffff;
}
.pub-text {
  flex: 1;
  font-size: 0.92em;
  font-weight: 300;
  line-height: 1.55;
}
.pub-title {
  font-weight: 500;
  color: #878df8;
}
.pub-title a {
  color: #878df8;
  text-decoration: none;
}
.pub-title a:hover {
  text-decoration: underline;
}
.pub-authors {
  font-size: 0.9em;
  font-weight: 300;
}
/* Author's own name — bold only, no color (sidebar already identifies the site owner) */
.pub-authors strong {
  font-weight: 500;
}
/* Venue name in golden */
.pub-text em {
  color: #fae377;
  font-style: normal;
  font-weight: 400;
}
/* First-author badge */
.pub-badge {
  display: inline-block;
  font-size: 0.75em;
  font-weight: 500;
  padding: 0.15em 0.55em;
  border-radius: 3px;
  border: 1px solid rgba(135, 141, 248, 0.5);
  color: #878df8;
  margin-right: 0.3em;
}
html:not([data-theme="dark"]) .pub-badge {
  border-color: rgba(74, 79, 208, 0.4);
  color: #4a4fd0;
}

/* Pill-style links */
.pub-links a {
  display: inline-block;
  font-size: 0.8em;
  font-weight: 400;
  text-decoration: none;
  padding: 0.1em 0.55em;
  border-radius: 3px;
  border: 1px solid rgba(118, 202, 241, 0.4);
  color: #76caf1;
  margin-right: 0.25em;
}
.pub-links a:hover {
  border-color: #76caf1;
  text-decoration: none;
}

/* Responsive: stack on mobile */
@media (max-width: 600px) {
  .pub-entry {
    flex-direction: column;
    gap: 0.6em;
  }
  .pub-image {
    flex: none;
    max-width: 100%;
  }
  .pub-image img {
    height: auto;
    max-height: 180px;
  }
}

/* Mobile sidebar: hide keyword tags, remove Follow button */
@media (max-width: 1023px) {
  .author__keywords {
    display: none;
  }
  .author__urls-wrapper button {
    display: none;
  }
  .author__urls {
    display: block !important;
    position: static;
    border: none;
    box-shadow: none;
    background: transparent;
    padding: 0;
    margin: 0;
    z-index: auto;
  }
  .author__urls::before {
    display: none;
  }
}

/* Masthead/nav polish */
.masthead {
  border-bottom: 1px solid var(--global-border-color, #243040);
}
.greedy-nav a.site-title {
  font-weight: 700;
}
.greedy-nav .visible-links a {
  font-weight: 500;
}

/* Button style */
.btn--inverse {
  border: 1px solid var(--global-border-color, #243040);
  font-size: 0.85em;
  font-weight: 500;
}

/* CV page accents */
/* Role/position/degree/service titles (first bold in each list item) */
.page__content li > strong:first-child,
.archive li > strong:first-child {
  color: #878df8;
}
/* Dates — gold */
.cv-date {
  color: #fae377;
}

/* Light theme overrides for palette colors */
html:not([data-theme="dark"]) .pub-title,
html:not([data-theme="dark"]) .pub-title a {
  color: #4a4fd0;
}
html:not([data-theme="dark"]) .pub-text em {
  color: #c47a00;
}
html:not([data-theme="dark"]) .news-list .news-date {
  color: #c47a00;
}
html:not([data-theme="dark"]) .pub-links a {
  color: #1a6fa8;
  border-color: rgba(26, 111, 168, 0.4);
}
html:not([data-theme="dark"]) .pub-links a:hover {
  border-color: #1a6fa8;
}
html:not([data-theme="dark"]) .page__content li > strong:first-child,
html:not([data-theme="dark"]) .archive li > strong:first-child {
  color: #4a4fd0;
}
html:not([data-theme="dark"]) .cv-date {
  color: #c47a00;
}
html:not([data-theme="dark"]) .page__content h2,
html:not([data-theme="dark"]) .archive h2 {
  border-bottom-color: rgba(74, 79, 208, 0.2);
}
html:not([data-theme="dark"]) .author__keyword {
  color: #2a6fa8;
  border-color: rgba(42, 111, 168, 0.35);
}
</style>

<!-- end custom head snippets -->
