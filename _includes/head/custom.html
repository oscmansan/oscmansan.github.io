{% include base_path %}

<!-- start custom head snippets -->

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#1e2b36"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Web fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&family=Google+Sans+Mono&display=swap" rel="stylesheet">

<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Custom styles -->
<style>
/* Typography override */
body {
  font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  font-weight: 300;
  letter-spacing: -0.011em;
}
h1, h2, h3 {
  font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-weight: 700;
  letter-spacing: -0.02em;
}
h4, h5, h6 {
  font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-weight: 500;
  letter-spacing: -0.01em;
}
code, pre {
  font-family: 'Google Sans Mono', Monaco, Consolas, monospace;
  font-weight: 400;
}

/* Author sidebar polish */
.author__name {
  font-weight: 700;
  font-size: 1.1em;
}
.author__bio {
  font-size: 0.9em;
  font-weight: 300;
  opacity: 0.85;
}
.author__urls-wrapper a {
  font-size: 0.9em;
  font-weight: 400;
}

/* News section — bullet list */
.news-list ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0.5em;
}
.news-list li {
  padding: 0.35em 0;
  line-height: 1.6;
  font-weight: 300;
  border-bottom: 1px solid var(--global-border-color, #243040);
}
.news-list li:last-child {
  border-bottom: none;
}
.news-list .news-date {
  font-weight: 500;
  font-size: 0.85em;
  color: var(--global-text-color-light, #5e6e7a);
  margin-right: 0.8em;
}

/* Section headings */
.page__content h2 {
  font-size: 1.3em;
  margin-top: 2em;
  padding-bottom: 0.3em;
  border-bottom: 1px solid var(--global-border-color, #243040);
}

/* Barron-style publication entries */
.pub-entry {
  display: flex;
  gap: 1.2em;
  padding: 0.8em 0;
  border-bottom: 1px solid var(--global-border-color, #243040);
}
.pub-entry:last-child {
  border-bottom: none;
}
.pub-image {
  flex: 0 0 160px;
  max-width: 160px;
}
.pub-image img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 4px;
  background: #ffffff;
}
.pub-text {
  flex: 1;
  font-size: 0.92em;
  font-weight: 300;
  line-height: 1.55;
}
.pub-title {
  font-weight: 500;
}
.pub-title a {
  text-decoration: none;
}
.pub-title a:hover {
  text-decoration: underline;
}
.pub-authors {
  font-size: 0.9em;
  font-weight: 300;
}
.pub-links a {
  font-size: 0.85em;
  font-weight: 400;
  text-decoration: none;
}
.pub-links a:hover {
  text-decoration: underline;
}

/* Responsive: stack on mobile */
@media (max-width: 600px) {
  .pub-entry {
    flex-direction: column;
    gap: 0.6em;
  }
  .pub-image {
    flex: none;
    max-width: 100%;
  }
  .pub-image img {
    height: auto;
    max-height: 180px;
  }
}

/* Masthead/nav polish */
.masthead {
  border-bottom: 1px solid var(--global-border-color, #243040);
}
.greedy-nav a.site-title {
  font-weight: 700;
}
.greedy-nav .visible-links a {
  font-weight: 500;
}

/* Button style */
.btn--inverse {
  border: 1px solid var(--global-border-color, #243040);
  font-size: 0.85em;
  font-weight: 500;
}
</style>

<!-- end custom head snippets -->
