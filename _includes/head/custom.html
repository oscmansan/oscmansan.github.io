{% include base_path %}

<!-- start custom head snippets -->

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#191a23"/>
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Web fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Custom styles -->
<style>
/* Typography override */
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 16px;
  letter-spacing: -0.011em;
}
h1, h2, h3, h4, h5, h6 {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-weight: 600;
  letter-spacing: -0.02em;
}
code, pre {
  font-family: 'JetBrains Mono', Monaco, Consolas, monospace;
}

/* Author sidebar polish */
.author__name {
  font-weight: 600;
  font-size: 1.1em;
}
.author__bio {
  font-size: 0.9em;
  opacity: 0.85;
}
.author__urls-wrapper a {
  font-size: 0.9em;
}

/* News section */
.news-list table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0.5em;
}
.news-list table tr {
  border-bottom: 1px solid var(--global-border-color, #21262d);
}
.news-list table tr:last-child {
  border-bottom: none;
}
.news-list table td {
  padding: 0.6em 0;
  border-bottom: none;
  vertical-align: top;
  line-height: 1.6;
}
.news-list table td:first-child {
  white-space: nowrap;
  font-weight: 500;
  font-size: 0.85em;
  color: var(--global-text-color-light, #8b949e);
  padding-right: 1.5em;
  width: 90px;
}

/* Section headings */
.page__content h2 {
  font-size: 1.3em;
  margin-top: 2em;
  padding-bottom: 0.3em;
  border-bottom: 1px solid var(--global-border-color, #21262d);
}

/* Publication items */
.archive__item {
  margin-bottom: 1.2em;
}
.archive__item-title {
  font-size: 1em;
  font-weight: 600;
  margin-bottom: 0.15em;
}
.archive__item-title a {
  text-decoration: none;
}
.archive__item-title a:hover {
  text-decoration: underline;
}

/* Publication link pills */
.archive__item-links {
  margin-top: 0.3em;
}
.archive__item-links a {
  display: inline-block;
  margin-right: 0.6em;
  padding: 0.15em 0.6em;
  font-size: 0.78em;
  font-weight: 500;
  text-decoration: none;
  border: 1px solid var(--global-border-color, #21262d);
  border-radius: 4px;
  transition: all 0.15s ease;
}
.archive__item-links a:hover {
  background-color: var(--global-link-color);
  color: #fff;
  border-color: var(--global-link-color);
}
.archive__item-links a i {
  margin-right: 0.3em;
}

/* Masthead/nav polish */
.masthead {
  border-bottom: 1px solid var(--global-border-color, #21262d);
}
.greedy-nav a.site-title {
  font-weight: 600;
}

/* Button style */
.btn--inverse {
  border: 1px solid var(--global-border-color, #21262d);
  font-size: 0.85em;
  font-weight: 500;
}
</style>

<!-- end custom head snippets -->
